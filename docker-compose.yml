services:

  mysql:

    image: mysql:8.0

    container_name: ai-crm-mysql

    restart: always

    environment:

      MYSQL_ROOT_PASSWORD: root

      MYSQL_DATABASE: ai_crm

    ports:

      - "3307:3306"

    volumes:

      - mysql_data:/var/lib/mysql

  backend:

    build: ./ai-crm-backend

    container_name: ai-crm-backend

    restart: always

    ports:

      - "8000:8000"

    env_file:

      - ./ai-crm-backend/.env

    depends_on:

      - mysql

  frontend:

    build: ./ai-crm-frontend

    container_name: ai-crm-frontend

    restart: always

    ports:

      - "5173:5173"

    depends_on:

      - backend

volumes:

  mysql_data: